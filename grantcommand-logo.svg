<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <!-- Background -->
  <rect width="800" height="800" rx="80" fill="#0f3460"/>
  
  <!-- Target/Command icon -->
  <!-- Outer ring -->
  <circle cx="400" cy="300" r="160" fill="none" stroke="#00897b" stroke-width="18"/>
  <!-- Middle ring -->
  <circle cx="400" cy="300" r="100" fill="none" stroke="#4fc3f7" stroke-width="14"/>
  <!-- Inner dot -->
  <circle cx="400" cy="300" r="38" fill="#00897b"/>
  
  <!-- Crosshair lines -->
  <line x1="400" y1="100" x2="400" y2="180" stroke="#00897b" stroke-width="14" stroke-linecap="round"/>
  <line x1="400" y1="420" x2="400" y2="500" stroke="#00897b" stroke-width="14" stroke-linecap="round"/>
  <line x1="200" y1="300" x2="280" y2="300" stroke="#00897b" stroke-width="14" stroke-linecap="round"/>
  <line x1="520" y1="300" x2="600" y2="300" stroke="#00897b" stroke-width="14" stroke-linecap="round"/>

  <!-- Text: Grant -->
  <text x="400" y="570" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" 
        font-size="96" 
        font-weight="800" 
        fill="#ffffff" 
        text-anchor="middle"
        letter-spacing="-2">Grant</text>

  <!-- Text: Command -->
  <text x="400" y="670" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" 
        font-size="96" 
        font-weight="800" 
        fill="#00897b" 
        text-anchor="middle"
        letter-spacing="-2">Command</text>
</svg>
