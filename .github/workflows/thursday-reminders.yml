name: Thursday Deadline Reminders

on:
  schedule:
    # Every Thursday at 12:00 UTC (7:00 AM CT / 8:00 AM EDT)
    - cron: '0 12 * * 4'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print output, do not send emails)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Thursday reminders
        env:
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_ID:  ${{ secrets.BEEHIIV_PUB_ID }}
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL:      ${{ secrets.FROM_EMAIL }}
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:     ${{ github.repository }}
          DRY_RUN:         ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/reminders.py
